<!DOCTYPE html>
<html lang="fr">
<head>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2GLPG3JB9N"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-2GLPG3JB9N');</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Dashboard — Mentova Academy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}

/* Login */
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:#16161e;border:1px solid #2a2a3a;border-radius:16px;padding:40px;max-width:400px;width:100%}
.login-box h1{font-size:24px;font-weight:800;color:#fff;margin-bottom:8px;text-align:center}
.login-box p{color:#888;font-size:14px;margin-bottom:24px;text-align:center}
.login-box input{width:100%;padding:12px 16px;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:10px;color:#fff;font-size:14px;margin-bottom:12px;outline:none;transition:border .2s}
.login-box input:focus{border-color:#7C3AED}
.login-box button{width:100%;padding:14px;background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
.login-box button:hover{opacity:.9}
.login-error{color:#ef4444;font-size:13px;margin-bottom:12px;display:none}

/* Dashboard */
.dashboard{display:none;max-width:1200px;margin:0 auto;padding:24px}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.dash-header h1{font-size:22px;font-weight:800;color:#fff}
.dash-header h1 span{color:#7C3AED}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-logout{padding:8px 16px;background:#1e1e2e;border:1px solid #2a2a3a;color:#888;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s}
.btn-logout:hover{background:#2a2a3a;color:#fff}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#16161e;border:1px solid #2a2a3a;border-radius:12px;padding:20px}
.stat-card .label{color:#888;font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-card .value{font-size:28px;font-weight:800;color:#fff}
.stat-card .value.pending{color:#f59e0b}
.stat-card .value.approved{color:#10b981}
.stat-card .value.rejected{color:#ef4444}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:8px 16px;background:#16161e;border:1px solid #2a2a3a;color:#888;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:#7C3AED;color:#fff;border-color:#7C3AED}

/* Applications list */
.app-list{display:flex;flex-direction:column;gap:12px}
.app-card{background:#16161e;border:1px solid #2a2a3a;border-radius:14px;padding:24px;transition:border .2s}
.app-card:hover{border-color:#3a3a4a}
.app-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.app-name{font-size:16px;font-weight:700;color:#fff}
.app-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-mentor{background:rgba(124,58,237,.15);color:#a78bfa}
.badge-ambassador{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-pending{background:rgba(245,158,11,.15);color:#fbbf24}
.badge-approved{background:rgba(16,185,129,.15);color:#34d399}
.badge-rejected{background:rgba(239,68,68,.15);color:#f87171}

.app-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-bottom:16px}
.app-detail{display:flex;flex-direction:column}
.app-detail .dt{color:#666;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.app-detail .dd{color:#ccc;font-size:13px;margin-top:2px}

.app-message{background:#0a0a0f;border-radius:8px;padding:12px;margin-bottom:16px}
.app-message .dt{color:#666;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.app-message .dd{color:#bbb;font-size:13px;line-height:1.5}

.app-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-approve{padding:10px 20px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-approve:hover{opacity:.85}
.btn-reject{padding:10px 20px;background:#dc2626;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-reject:hover{opacity:.85}
.btn-approve:disabled,.btn-reject:disabled{opacity:.4;cursor:not-allowed}
.reviewed-tag{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600}
.reviewed-tag.approved{background:rgba(16,185,129,.1);color:#34d399}
.reviewed-tag.rejected{background:rgba(239,68,68,.1);color:#f87171}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:#16161e;border:1px solid #2a2a3a;border-radius:16px;padding:32px;max-width:500px;width:100%}
.modal-box h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
.modal-box .sub{color:#888;font-size:13px;margin-bottom:20px}
.modal-box textarea{width:100%;padding:12px;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:10px;color:#fff;font-size:14px;min-height:120px;resize:vertical;outline:none;margin-bottom:16px;font-family:inherit}
.modal-box textarea:focus{border-color:#7C3AED}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:10px 20px;background:#1e1e2e;border:1px solid #2a2a3a;color:#888;border-radius:8px;font-size:13px;cursor:pointer}
.btn-cancel:hover{background:#2a2a3a;color:#fff}
.btn-send{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:700;color:#fff;cursor:pointer}
.btn-send.approve{background:#059669}
.btn-send.reject{background:#dc2626}
.btn-send:disabled{opacity:.5;cursor:wait}

.empty-state{text-align:center;padding:60px 20px;color:#666}
.empty-state p{font-size:15px}

.loading{text-align:center;padding:40px;color:#888}

@media(max-width:600px){
  .dashboard{padding:16px}
  .app-card{padding:16px}
  .stats-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container" id="loginSection">
<div class="login-box">
  <h1>Mentova Admin</h1>
  <p>Connexion super admin requise</p>
  <div class="login-error" id="loginError"></div>
  <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
  <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="current-password">
  <button onclick="doLogin()">Se connecter</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashSection">
  <div class="dash-header">
    <h1><span>Mentova</span> Admin</h1>
    <div class="header-actions">
      <span id="adminEmail" style="color:#888;font-size:13px"></span>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="label">Total</div><div class="value" id="statTotal">-</div></div>
    <div class="stat-card"><div class="label">En attente</div><div class="value pending" id="statPending">-</div></div>
    <div class="stat-card"><div class="label">Approuvés</div><div class="value approved" id="statApproved">-</div></div>
    <div class="stat-card"><div class="label">Refusés</div><div class="value rejected" id="statRejected">-</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Tous</button>
    <button class="filter-btn" data-filter="mentor" onclick="setFilter('mentor',this)">Mentors</button>
    <button class="filter-btn" data-filter="ambassador" onclick="setFilter('ambassador',this)">Ambassadeurs</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending',this)">En attente</button>
    <button class="filter-btn" data-filter="approved" onclick="setFilter('approved',this)">Approuvés</button>
    <button class="filter-btn" data-filter="rejected" onclick="setFilter('rejected',this)">Refusés</button>
  </div>

  <div id="appList" class="app-list">
    <div class="loading">Chargement des candidatures...</div>
  </div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-overlay" id="reviewModal">
<div class="modal-box">
  <h2 id="modalTitle">Approuver la candidature</h2>
  <p class="sub" id="modalSub">Un email sera envoyé au candidat avec votre décision.</p>
  <textarea id="modalMessage" placeholder="Écrivez un message personnalisé pour le candidat (optionnel)..."></textarea>
  <div class="modal-actions">
    <button class="btn-cancel" onclick="closeModal()">Annuler</button>
    <button class="btn-send" id="modalSendBtn" onclick="submitReview()">Envoyer</button>
  </div>
</div>
</div>

<script>
const API_URL = 'https://mentova-api.onrender.com';
let token = localStorage.getItem('mentova_admin_token');
let allApps = [];
let currentFilter = 'all';
let reviewData = null;

// Auto-login if token exists
if (token) { showDashboard(); loadApplications(); }

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  try {
    const r = await fetch(API_URL + '/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await r.json();
    if (!r.ok || !data.access_token) {
      errEl.textContent = data.detail || 'Erreur de connexion';
      errEl.style.display = 'block';
      return;
    }
    if (data.user.role !== 'super_admin' && data.user.role !== 'admin') {
      errEl.textContent = 'Accès admin requis';
      errEl.style.display = 'block';
      return;
    }
    token = data.access_token;
    localStorage.setItem('mentova_admin_token', token);
    document.getElementById('adminEmail').textContent = data.user.email;
    showDashboard();
    loadApplications();
  } catch(e) {
    errEl.textContent = 'Erreur réseau';
    errEl.style.display = 'block';
  }
}

function doLogout() {
  token = null;
  localStorage.removeItem('mentova_admin_token');
  document.getElementById('loginSection').style.display = 'flex';
  document.getElementById('dashSection').style.display = 'none';
}

function showDashboard() {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('dashSection').style.display = 'block';
}

async function loadApplications() {
  try {
    const r = await fetch(API_URL + '/api/admin/applications', {
      headers: {'Authorization': 'Bearer ' + token}
    });
    if (r.status === 401 || r.status === 403) { doLogout(); return; }
    const data = await r.json();
    allApps = data.applications || [];
    updateStats();
    renderApps();
  } catch(e) {
    document.getElementById('appList').innerHTML = '<div class="empty-state"><p>Erreur de chargement. Vérifiez votre connexion.</p></div>';
  }
}

function updateStats() {
  document.getElementById('statTotal').textContent = allApps.length;
  document.getElementById('statPending').textContent = allApps.filter(a => a.status === 'pending').length;
  document.getElementById('statApproved').textContent = allApps.filter(a => a.status === 'approved').length;
  document.getElementById('statRejected').textContent = allApps.filter(a => a.status === 'rejected').length;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderApps();
}

function renderApps() {
  let filtered = allApps;
  if (currentFilter === 'mentor') filtered = allApps.filter(a => a.type === 'mentor');
  else if (currentFilter === 'ambassador') filtered = allApps.filter(a => a.type === 'ambassador');
  else if (currentFilter === 'pending') filtered = allApps.filter(a => a.status === 'pending');
  else if (currentFilter === 'approved') filtered = allApps.filter(a => a.status === 'approved');
  else if (currentFilter === 'rejected') filtered = allApps.filter(a => a.status === 'rejected');

  if (!filtered.length) {
    document.getElementById('appList').innerHTML = '<div class="empty-state"><p>Aucune candidature trouvée.</p></div>';
    return;
  }

  document.getElementById('appList').innerHTML = filtered.map(app => {
    const date = new Date(app.created_at).toLocaleDateString('fr-FR', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const typeBadge = app.type === 'mentor' ? '<span class="badge badge-mentor">Mentor</span>' : '<span class="badge badge-ambassador">Ambassadeur</span>';
    const statusBadge = app.status === 'pending' ? '<span class="badge badge-pending">En attente</span>' : app.status === 'approved' ? '<span class="badge badge-approved">Approuvé</span>' : '<span class="badge badge-rejected">Refusé</span>';

    let details = '';
    if (app.type === 'mentor') {
      details = `
        <div class="app-detail"><span class="dt">Spécialité</span><span class="dd">${app.specialty||'-'}</span></div>
        <div class="app-detail"><span class="dt">Expérience</span><span class="dd">${app.years_experience||'-'} ans</span></div>
        <div class="app-detail"><span class="dt">Style</span><span class="dd">${app.trading_style||'-'}</span></div>
        <div class="app-detail"><span class="dt">Localisation</span><span class="dd">${app.city||''} ${app.country||''}</span></div>
        <div class="app-detail"><span class="dt">Audience</span><span class="dd">${app.audience_size||'-'}</span></div>
        <div class="app-detail"><span class="dt">Langue</span><span class="dd">${app.language||'-'}</span></div>
      `;
    } else {
      details = `
        <div class="app-detail"><span class="dt">Plateforme</span><span class="dd">${app.platform||'-'}</span></div>
        <div class="app-detail"><span class="dt">Audience</span><span class="dd">${app.audience_size||'-'}</span></div>
        <div class="app-detail"><span class="dt">Langue</span><span class="dd">${app.language||'-'}</span></div>
        <div class="app-detail"><span class="dt">Pays</span><span class="dd">${app.country||'-'}</span></div>
      `;
    }

    const msgContent = app.type === 'mentor' ? (app.motivation || app.teaching_experience || '') : (app.message || '');
    const msgBlock = msgContent ? `<div class="app-message"><span class="dt">${app.type==='mentor'?'Motivation':'Message'}</span><div class="dd">${msgContent}</div></div>` : '';

    const reviewMsg = app.review_message ? `<div class="app-message"><span class="dt">Votre réponse</span><div class="dd">${app.review_message}</div></div>` : '';

    let actions = '';
    if (app.status === 'pending') {
      actions = `
        <button class="btn-approve" onclick="openReview('${app._id}','${app.type}','approved','${app.name.replace(/'/g,"\\'")}')">Approuver</button>
        <button class="btn-reject" onclick="openReview('${app._id}','${app.type}','rejected','${app.name.replace(/'/g,"\\'")}')">Refuser</button>
      `;
    } else {
      actions = `<div class="reviewed-tag ${app.status}">${app.status === 'approved' ? 'Approuvé' : 'Refusé'}${app.reviewed_at ? ' le ' + new Date(app.reviewed_at).toLocaleDateString('fr-FR') : ''}</div>`;
    }

    return `
    <div class="app-card">
      <div class="app-card-header">
        <div>
          <span class="app-name">${app.name}</span>
          <span style="color:#888;font-size:13px;margin-left:8px">${app.email}</span>
        </div>
        <div class="app-badges">${typeBadge}${statusBadge}</div>
      </div>
      <div class="app-details">${details}</div>
      ${msgBlock}
      ${reviewMsg}
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <span style="color:#555;font-size:12px">${date}</span>
        <div class="app-actions">${actions}</div>
      </div>
    </div>`;
  }).join('');
}

function openReview(id, type, decision, name) {
  reviewData = {id, type, decision};
  const modal = document.getElementById('reviewModal');
  const title = document.getElementById('modalTitle');
  const sub = document.getElementById('modalSub');
  const btn = document.getElementById('modalSendBtn');
  document.getElementById('modalMessage').value = '';

  if (decision === 'approved') {
    title.textContent = `Approuver ${name}`;
    sub.textContent = 'Un email de confirmation sera envoyé au candidat.';
    btn.className = 'btn-send approve';
    btn.textContent = 'Approuver et envoyer';
  } else {
    title.textContent = `Refuser ${name}`;
    sub.textContent = 'Un email de notification sera envoyé au candidat.';
    btn.className = 'btn-send reject';
    btn.textContent = 'Refuser et envoyer';
  }
  modal.classList.add('show');
}

function closeModal() {
  document.getElementById('reviewModal').classList.remove('show');
  reviewData = null;
}

async function submitReview() {
  if (!reviewData) return;
  const btn = document.getElementById('modalSendBtn');
  btn.disabled = true;
  btn.textContent = 'Envoi en cours...';

  const message = document.getElementById('modalMessage').value.trim();

  try {
    const r = await fetch(`${API_URL}/api/admin/applications/${reviewData.type}/${reviewData.id}/review`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
      body: JSON.stringify({decision: reviewData.decision, message})
    });
    const data = await r.json();
    if (data.success) {
      closeModal();
      await loadApplications();
    } else {
      alert('Erreur: ' + (data.detail || 'Échec'));
    }
  } catch(e) {
    alert('Erreur réseau');
  }
  btn.disabled = false;
}

// Enter key on login
document.getElementById('loginPassword').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
